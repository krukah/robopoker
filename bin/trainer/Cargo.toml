[package]
name         = "trainer"
publish      = false
version      = "0.1.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "MCCFR training pipeline binary"
license      = "MIT"

[[bin]]
name = "trainer"
path = "src/main.rs"

[dependencies]
rbp-autotrain      = { path = "../../crates/autotrain" }
clap               = { version = "4", features = ["derive"] }
tokio              = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[lints]
workspace = true
