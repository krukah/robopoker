[package]
name         = "backend"
publish      = false
version      = "0.1.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "Unified backend server binary"
license      = "MIT"

[[bin]]
name = "backend"
path = "src/main.rs"

[dependencies]
portal             = { path = "../../crates/portal" }
tokio              = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[lints]
workspace = true
