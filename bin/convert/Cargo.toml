[package]
name         = "convert"
publish      = false
version      = "0.1.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "Interactive CLI for poker analysis"
license      = "MIT"

[[bin]]
name = "convert"
path = "src/main.rs"

[dependencies]
fulcrum = { path = "../../crates/fulcrum", features = ["server"] }
portal  = { path = "../../crates/portal" }
vitals  = { path = "../../crates/vitals" }
tokio   = { version = "1", features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true
