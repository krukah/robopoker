[package]
name         = "convert"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "Interactive CLI for poker analysis"
license      = "MIT"

[[bin]]
name         = "convert"
path         = "src/main.rs"

[dependencies]
rbp-core      = { path = "../../crates/util", features = ["server"] }
rbp-server    = { path = "../../crates/server" }
rbp-telemetry = { path = "../../crates/telemetry" }
tokio         = { version = "1", features = ["rt-multi-thread", "macros"] }
