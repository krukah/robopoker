[package]
name           = "rbp-slumbot"
version        = "1.0.0"
edition        = "2024"
rust-version   = "1.90"
authors        = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description    = "Slumbot API benchmark client for MCCFR strategy evaluation"
license        = "MIT"
repository     = "https://github.com/krukah/robopoker"
keywords       = ["poker", "benchmark", "slumbot"]
categories     = ["game-development"]

[features]
# `database` is retained as a no-op feature so external invocations that still
# pass `--features database` keep working. All dependencies are unconditional;
# slumbot is useless without DB+blueprint access, so there's no minimal build
# to preserve.
default        = []
database       = []

[dependencies]
rbp-core       = { path = "../util"                                         }
rbp-cards      = { path = "../cards"                                        }
rbp-auth       = { path = "../auth",     features = ["database"]            }
rbp-gameplay   = { path = "../gameplay"                                     }
rbp-gameroom   = { path = "../gameroom", features = ["database"]            }
rbp-nlhe     = { path = "../nlhe",   features = ["database"]            }
rbp-telemetry  = { path = "../telemetry"                                    }
tokio-postgres = { version = "0.7",      features = ["with-uuid-1"]         }
tokio          = { version = "1",   features = ["rt", "sync", "time"]        }
anyhow         = "1"
tracing       = { workspace = true }
serde          = { version = "1",    features = ["derive"]                  }
serde_json     = "1"
reqwest        = { version = "0.12", features = ["json"]                   }

[lints]
workspace = true
