[package]
name         = "rbp-rps"
publish      = false
version      = "1.1.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "Rock-Paper-Scissors solver for MCCFR framework validation"
license      = "MIT"
repository   = "https://github.com/krukah/robopoker"
keywords     = ["rps", "cfr", "game-theory", "solver"]
categories   = ["algorithms", "mathematics", "game-development"]

[[bin]]
name = "rps"
path = "src/main.rs"

[dependencies]
rbp-core      = { workspace = true }
rbp-mccfr     = { workspace = true }
rbp-subgame   = { workspace = true }
rbp-depth     = { workspace = true }
rbp-world     = { workspace = true }
rbp-transport = { workspace = true }
paste         = "1.0"
rand          = { workspace = true }

[lints]
workspace = true
