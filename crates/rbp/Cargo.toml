[package]
name         = "rbp"
publish      = false
version      = "1.1.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "GTO poker toolkit: MCCFR solver, hand evaluation, strategic abstraction, and training pipeline"
license      = "MIT"
repository   = "https://github.com/krukah/robopoker"
keywords     = ["poker", "mccfr", "gto", "solver", "holdem"]
categories   = ["game-development", "algorithms", "mathematics"]

[features]
async     = ["rbp-mccfr/async"]
shortdeck = ["rbp-cards/shortdeck"]

[dependencies]
rbp-core        = { workspace = true }
rbp-transport   = { workspace = true }
rbp-cards       = { workspace = true }
rbp-mccfr       = { workspace = true }
rbp-gameplay    = { workspace = true }
rbp-clustering  = { workspace = true }
rbp-translate   = { workspace = true }
rbp-world       = { workspace = true }
rbp-depth       = { workspace = true }
rbp-subgame     = { workspace = true }
rbp-nlhe        = { workspace = true }
rbp-leduc       = { workspace = true }
rbp-kuhn        = { workspace = true }
rbp-rps         = { workspace = true }
rbp-database    = { workspace = true }
rbp-auth        = { workspace = true }
rbp-telemetry   = { workspace = true }
rbp-gameroom    = { workspace = true }
rbp-server      = { workspace = true }
rbp-autotrain   = { workspace = true }
rbp-competition = { workspace = true }
rbp-slumbot     = { workspace = true }
rbp-litmus      = { workspace = true }

[lints]
workspace = true
