[package]
name         = "rbp-core"
version      = "1.0.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "Core type aliases, traits, and constants for robopoker"
license      = "MIT"
repository   = "https://github.com/krukah/robopoker"
keywords     = ["poker", "types", "constants"]
categories   = ["game-development"]

[features]
default = []
server  = ["tracing", "tokio"]
client  = ["uuid/js"]
cli     = ["clap"]

[dependencies]
rbp-translate = { path = "../translate" }
rand    = { workspace = true }
uuid    = { version = "1", features = ["v5", "v7", "serde"] }
serde   = { version = "1.0", features = ["derive"] }
clap    = { optional = true, workspace = true }
tracing = { optional = true, workspace = true }
tokio   = { optional = true, version = "1.0", features = ["signal", "rt"] }

[lints]
workspace = true
