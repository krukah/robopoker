[package]
name         = "robopoker"
publish      = false
version      = "1.1.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "GTO poker toolkit: MCCFR solver, hand evaluation, strategic abstraction, and training pipeline"
license      = "MIT"
repository   = "https://github.com/krukah/robopoker"
keywords     = ["poker", "mccfr", "gto", "solver", "holdem"]
categories   = ["game-development", "algorithms", "mathematics"]

[features]
async     = ["mccfr/async"]
shortdeck = ["kicker/shortdeck"]

[dependencies]
pokerkit = { workspace = true }
monge    = { workspace = true }
kicker   = { workspace = true }
mccfr    = { workspace = true }
cowboys  = { workspace = true }
lloyd    = { workspace = true }
dragoman = { workspace = true }
atlas    = { workspace = true }
horizon  = { workspace = true }
endgame  = { workspace = true }
holdem   = { workspace = true }
leduc    = { workspace = true }
kuhn     = { workspace = true }
roshambo = { workspace = true }
ledger   = { workspace = true }
bouncer  = { workspace = true }
vitals   = { workspace = true }
parlor   = { workspace = true }
portal   = { workspace = true }
forge    = { workspace = true }
arena    = { workspace = true }
spar     = { workspace = true }
litmus   = { workspace = true }

[lints]
workspace = true
