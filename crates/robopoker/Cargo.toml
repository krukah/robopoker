[package]
name         = "robopoker"
version      = "1.1.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "GTO poker toolkit: MCCFR solver, nanosecond hand evaluation, optimal transport, and safe + depth-limited subgame solving"
license      = "MIT"
repository   = "https://github.com/krukah/robopoker"
keywords     = ["poker", "mccfr", "gto", "solver", "nlhe"]
categories   = ["game-development", "algorithms", "mathematics"]

[features]
async     = ["mccfr/async"]
shortdeck = ["deuce/shortdeck"]

# The facade re-exports only the published (library) crates. Private
# application/service crates (parlor, portal, forge, arena, spar, litmus)
# and internal helpers (lloyd, bouncer, kuhn, leduc, roshambo) are
# deliberately excluded so this crate can publish to crates.io.
[dependencies]
pokerkit = { workspace = true }
deuce    = { workspace = true }
monge    = { workspace = true }
elkan    = { workspace = true }
kicker   = { workspace = true }
mccfr    = { workspace = true }
subgame  = { workspace = true }
nlhe     = { workspace = true }
daybook   = { workspace = true }
vitals   = { workspace = true }

[lints]
workspace = true
