[package]
name         = "rbp-translate"
version      = "1.0.0"
edition      = "2024"
rust-version = "1.90"
authors      = ["Kelechi Ukah <ukahkelechi@gmail.com>"]
description  = "Generic action translation over finite lattices on a totally-ordered axis"
license      = "MIT"
repository   = "https://github.com/krukah/robopoker"
keywords     = ["action-translation", "pseudo-harmonic", "abstraction", "cfr", "game-theory"]
categories   = ["algorithms", "game-development", "mathematics"]

[dependencies]
rand         = { version = "0.9.1", features = ["small_rng"] }
