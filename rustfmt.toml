# Wider single-line tolerance — prevents rustfmt from expanding
# short-but-content-dense calls onto multiple lines. The defaults
# (max_width=100, fn_call_width=60, attr_fn_like_width=70) turn
# `inspect_err(|e| tracing::warn!(input = %x, error = %e, "msg"))`
# into a 4-line block, which is strictly less readable than the
# original. Bumping the line budget to 120 with matching fn/macro
# widths keeps method chains tidy without runaway lines.
max_width                     = 120
# fn_call_width / attr_fn_like_width have a hard cap of 100 in rustfmt
# regardless of max_width — 100 is the upper bound we can set them to.
fn_call_width                 = 100
attr_fn_like_width            = 100
single_line_if_else_max_width = 80
